<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - October Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .login-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-section h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .logo-section p { color: #aaa; }

        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #ddd;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
            background: rgba(255,255,255,0.12);
        }
        .form-group input::placeholder { color: #666; }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: rgba(233, 69, 96, 0.2);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: #aaa;
        }
        .register-link a {
            color: #e94560;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover { text-decoration: underline; }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 0.9em;
        }
        .back-link a:hover { color: #e94560; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <h1>🎃 October Store</h1>
            <p>تسجيل الدخول إلى حسابك</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>📧 البريد الإلكتروني</label>
                <input type="email" name="email" id="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>🔒 كلمة المرور</label>
                <input type="password" name="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login" id="btnLogin">تسجيل الدخول</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top:15px; color:#aaa;">جاري التحقق...</p>
        </div>

        <div class="register-link">
            ليس لديك حساب؟ <a href="/register">سجل الآن</a>
        </div>
        <div class="back-link">
            <a href="/">← العودة للرئيسية</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btnLogin');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            loading.style.display = 'block';
            errorMsg.style.display = 'none';

            const formData = new FormData(e.target);

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'حدث خطأ في الاتصال بالخادم';
                errorMsg.style.display = 'block';
            }

            btn.disabled = false;
            loading.style.display = 'none';
        });
    </script>
</body>
</html>
