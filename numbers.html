<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شراء أرقام - October Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px 0;
            border-left: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-logo {
            text-align: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-logo h2 {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-menu { padding: 20px 0; }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            color: #aaa;
            text-decoration: none;
            transition: all 0.3s;
            border-right: 3px solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(233, 69, 96, 0.1);
            color: #e94560;
            border-right-color: #e94560;
        }
        .nav-item span { margin-left: 12px; }

        .main-content {
            margin-right: 260px;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2em; }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter-select, .filter-input {
            padding: 12px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            min-width: 200px;
        }
        .filter-select:focus, .filter-input:focus {
            outline: none;
            border-color: #e94560;
        }
        .filter-select option { background: #1a1a2e; }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .number-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .number-card:hover {
            transform: translateY(-5px);
            border-color: #e94560;
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.2);
        }
        .number-card .country-flag {
            font-size: 2.5em;
            margin-bottom: 15px;
        }
        .number-card .phone {
            font-size: 1.5em;
            font-weight: bold;
            direction: ltr;
            margin-bottom: 10px;
            color: #fff;
        }
        .number-card .country-name {
            color: #aaa;
            margin-bottom: 15px;
        }
        .number-card .price {
            font-size: 1.8em;
            color: #e94560;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .btn-buy {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-buy:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
        }
        .btn-buy:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #333;
            color: #fff;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .toast.error { background: linear-gradient(135deg, #e94560, #ff6b6b); }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <h2>🎃 October Store</h2>
        </div>
        <nav class="nav-menu">
            <a href="/dashboard" class="nav-item">
                <span>🏠</span> الرئيسية
            </a>
            <a href="/numbers" class="nav-item active">
                <span>📱</span> شراء أرقام
            </a>
            <a href="/my-numbers" class="nav-item">
                <span>📋</span> أرقامي
            </a>
            <a href="/wallet" class="nav-item">
                <span>💰</span> المحفظة
            </a>
            <a href="/api" class="nav-item">
                <span>🔌</span> API
            </a>
            <a href="/logout" class="nav-item">
                <span>🚪</span> تسجيل الخروج
            </a>
        </nav>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>📱 شراء أرقام</h1>
        </div>

        <div class="filters">
            <select class="filter-select" id="countryFilter" onchange="filterNumbers()">
                <option value="">جميع الدول</option>
                {% for c in countries %}
                <option value="{{ c.country_code }}">{{ c.country_name }}</option>
                {% endfor %}
            </select>
            <input type="text" class="filter-input" id="searchInput" 
                   placeholder="🔍 البحث برقم..." oninput="filterNumbers()">
        </div>

        <div class="numbers-grid" id="numbersGrid">
            {% for num in numbers %}
            <div class="number-card" data-country="{{ num.country_code }}" data-number="{{ num.phone_number }}">
                <div class="country-flag">🌍</div>
                <div class="phone">+{{ num.phone_number }}</div>
                <div class="country-name">{{ num.country_name }}</div>
                <div class="price">${{ "%.2f"|format(num.price) }}</div>
                <button class="btn-buy" onclick="buyNumber({{ num.id }}, {{ num.price }})">
                    🛒 شراء الآن
                </button>
            </div>
            {% else %}
            <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #aaa;">
                <div style="font-size: 4em; margin-bottom: 20px;">📭</div>
                <h2>لا توجد أرقام متاحة</h2>
                <p>يرجى المحاولة لاحقاً أو التواصل مع الإدارة</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function filterNumbers() {
            const country = document.getElementById('countryFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.number-card');

            cards.forEach(card => {
                const cardCountry = card.dataset.country;
                const cardNumber = card.dataset.number;

                const matchCountry = !country || cardCountry === country;
                const matchSearch = !search || cardNumber.includes(search);

                card.style.display = matchCountry && matchSearch ? 'block' : 'none';
            });
        }

        async function buyNumber(id, price) {
            if (!confirm(`هل تريد شراء هذا الرقم بـ $${price}؟`)) return;

            document.getElementById('loadingOverlay').classList.add('active');

            try {
                const response = await fetch('/buy-number', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number_id: id })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('✅ تم شراء الرقم بنجاح!', 'success');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showToast('❌ ' + data.message, 'error');
                }
            } catch (err) {
                showToast('❌ حدث خطأ', 'error');
            }

            document.getElementById('loadingOverlay').classList.remove('active');
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
